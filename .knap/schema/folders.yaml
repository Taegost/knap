# Folder classification for knap scripts.
# working: folders actively used by the user (content lives here)
# system: folders used by the knap system (infrastructure lives here)
# excluded: folders entirely excluded from processing

working:
  - wiki/

system:
  - .knap/

excluded:
  - .claude
  - .venv
  - .git
  - __pycache__
  - docs/brainstorms
  - docs/plans
